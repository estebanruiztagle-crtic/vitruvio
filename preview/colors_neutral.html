<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow Condensed', Arial, sans-serif; background: #F5F5F5; padding: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 120px; }
  .color { height: 80px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); }
  .name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; color: #1C1F23; }
  .hex  { font-size: 11px; color: #7D7D7D; font-family: monospace; margin-top: 2px; }
  .use  { font-size: 10px; color: #999; margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="swatch"><div class="color" style="background:#000000;"></div><div class="name">Pure Black</div><div class="hex">#000000</div><div class="use">Text · graphic elements</div></div>
  <div class="swatch"><div class="color" style="background:#1C1F23;"></div><div class="name">Ink Black</div><div class="hex">#1C1F23</div><div class="use">Dark sections · bg</div></div>
  <div class="swatch"><div class="color" style="background:#7D7D7D;"></div><div class="name">Mid Gray</div><div class="hex">#7D7D7D</div><div class="use">Labels · secondary</div></div>
  <div class="swatch"><div class="color" style="background:#D8D6D8;"></div><div class="name">Light Gray</div><div class="hex">#D8D6D8</div><div class="use">Subtle elements</div></div>
  <div class="swatch"><div class="color" style="background:#FFFFFF; border: 1px solid #DDD;"></div><div class="name">Pure White</div><div class="hex">#FFFFFF</div><div class="use">On dark · clean bg</div></div>
</body>
</html>
