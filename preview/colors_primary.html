<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Barlow Condensed'; src: url('../fonts/BarlowCondensed-Regular.ttf') format('truetype'); font-weight: 400; }
  @font-face { font-family: 'Barlow Condensed'; src: url('../fonts/BarlowCondensed-Bold.ttf') format('truetype'); font-weight: 700; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow Condensed', Arial, sans-serif; background: #F5F5F5; padding: 24px; display: flex; gap: 16px; }
  .swatch { width: 160px; }
  .color { height: 100px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); }
  .name { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; color: #1C1F23; }
  .hex  { font-size: 11px; color: #7D7D7D; font-family: monospace; margin-top: 3px; }
  .use  { font-size: 10px; color: #999; margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="color" style="background:#FE440D;"></div>
    <div class="name">CRTIC Orange</div>
    <div class="hex">#FE440D</div>
    <div class="use">Color primario · Hero · CTA · Fondos</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#FFDE58;"></div>
    <div class="name">Accent Yellow</div>
    <div class="hex">#FFDE58</div>
    <div class="use">Acento secundario · Highlight · Labels</div>
  </div>
</body>
</html>
