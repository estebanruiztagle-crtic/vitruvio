<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'Bebas Neue'; src: url('../fonts/BebasNeue-Regular.ttf') format('truetype'); font-weight: 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FE440D; padding: 32px; overflow: hidden; }
  .label { font-family: Arial, sans-serif; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  .mix { line-height: 0.95; }
  .sans { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: white; text-transform: uppercase; letter-spacing: -1px; display: block; }
  .serif { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 56px; color: #1C1F23; display: block; }
  .meta { font-family: Arial, sans-serif; font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 20px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="label">Playfair Display Italic — Contraste editorial (mezcla con Bebas Neue)</div>
  <div class="mix">
    <span class="sans">INTERPRETACIÓN</span>
    <span class="serif">en Vivo</span>
    <span class="sans">DEL FUTURO</span>
  </div>
  <div class="meta">Uso: Palabras clave en contraste, citas, énfasis editorial · Siempre en minúscula/itálica<br>La tensión visual entre sans y serif ES el diseño.</div>
</body>
</html>
