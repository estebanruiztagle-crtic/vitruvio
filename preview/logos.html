<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F5F5F5; padding: 28px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
  .logo-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo-bg { padding: 20px 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; min-width: 120px; min-height: 80px; }
  .lbl { font-family: monospace; font-size: 9px; color: #7D7D7D; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <div class="logo-item">
    <div class="logo-bg" style="background:#FE440D;">
      <img src="../assets/logo_white.png" height="56">
    </div>
    <div class="lbl">logo_white<br>on orange</div>
  </div>
  <div class="logo-item">
    <div class="logo-bg" style="background:#1C1F23;">
      <img src="../assets/logo_white.png" height="56">
    </div>
    <div class="lbl">logo_white<br>on ink</div>
  </div>
  <div class="logo-item">
    <div class="logo-bg" style="background:#FFFFFF; border:1px solid #DDD;">
      <img src="../assets/logo_orange.png" height="56">
    </div>
    <div class="lbl">logo_orange<br>on white</div>
  </div>
  <div class="logo-item">
    <div class="logo-bg" style="background:#FFFFFF; border:1px solid #DDD;">
      <img src="../assets/logo_black.png" height="56">
    </div>
    <div class="lbl">logo_black<br>on white</div>
  </div>
  <div class="logo-item">
    <div class="logo-bg" style="background:#F5F5F5;">
      <img src="../assets/logo_circle_orange.png" height="64">
    </div>
    <div class="lbl">logo_circle<br>avatar / app icon</div>
  </div>
</body>
</html>
